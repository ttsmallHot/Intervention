# Intervention config — Gemma-3-4B + FrozenLake probe
model_type : gemma3
model_path : /code/gemma-3-4b
data_path  : /code/data/frozenlake_probe_train/train.parquet
output_dir : /code/Intervention/checkpoints/gemma3_frozenlake

# Plugin
mode          : image        # image | text | both | oppose
boost_strength_init : 0.0    # initial value for learnable strength
free_train    : false        # false = unified scalar (1 param); true = per-layer (N params)
# layer_range : null         # null = auto (deeper half of network)

# Training
num_epochs   : 50
batch_size   : 16
learning_rate: 1.0e-3
grad_clip    : 1.0
eval_every   : 5
max_samples  : null           # null = use all data
